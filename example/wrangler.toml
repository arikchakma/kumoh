name = "example-app"
main = "dist/entry.js"
compatibility_date = "2025-03-14"

[[d1_databases]]
binding = "DB"
database_name = "example-db"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[kv_namespaces]]
binding = "KV"
id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "example-bucket"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-queue"

[[queues.consumers]]
queue = "email-queue"

[triggers]
crons = ["0 */6 * * *"]
